---
name: Load Parameters
description: Load parameters for the workflow

inputs:
  build_options_file:
    description: The file containing build options
    required: true
    type: string
    default: 'ci/build_options.txt'
  target_image_file:
    description: JSON file to parse as matrix (e.g., Target_image.json)
    required: true
    type: string
    default: 'target_image.json'
  target:
    description: Current target being built
    required: false
    type: string

outputs:
  build_args:
    description: The build arguments
    value: ${{ steps.parse_args.outputs.build_args }}
  build_matrix:
    description: JSON to be used as a matrix via fromJSON()
    value: ${{ steps.parse_matrix.outputs.build_matrix }}

runs:
  using: 'composite'
  steps:
    - name: Parse Target_image.json to matrix
      id: parse_matrix
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const p = `${{ github.action_path }}/${{ inputs.target_image_file }}`;

          if (!fs.existsSync(p)) {
            core.setFailed(`Target image file not found: ${p}`);
          } else {
            let raw = fs.readFileSync(p, 'utf8');
            let data;
            try {
              data = JSON.parse(raw);
            } catch (e) {
              core.setFailed(`Invalid JSON in ${p}: ${e.message}`);
            }

            if (data) {
              const include = Object.entries(data).map(([target, cfg]) => ({
                target,
                ...cfg,
                target_name: target,
                test_file: cfg.Test_file,
                sdk_name: cfg.SDK_name,
                image_name: cfg.Image_name,
                machine_name: cfg.Machine_name,
                build_script: cfg.Build_script,
                build_args: cfg.Build_args,
                testing_enabled: cfg.Testing_enabled
              }));
              // Output a FLAT ARRAY to match strategy.matrix.build_matrix: fromJson(...)
              const out = JSON.stringify(include);
              core.info(`Build matrix (flat): ${out}`);
              core.setOutput('build_matrix', out);
            }
          }

    - name: Parse the build arguments
      id: parse_args
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const targetImagePath = `${{ github.action_path }}/${{ inputs.target_image_file }}`;
          let buildArgsPath = '';
          let options = '';

          try {
            // Read target image configuration
            const targetImageData = JSON.parse(fs.readFileSync(targetImagePath, 'utf8'));
            const currentTarget = '${{ inputs.target }}' || Object.keys(targetImageData)[0];
            
            if (targetImageData[currentTarget]) {
              buildArgsPath = `${{ github.workspace }}/${targetImageData[currentTarget].Build_args}`;
              console.log(`Using build args file: ${buildArgsPath}`);
              
              if (fs.existsSync(buildArgsPath)) {
                options = fs.readFileSync(buildArgsPath).toString().trim().split('\n').join(' ');
                console.log(`✅ Successfully read build options for target: ${currentTarget}`);
              } else {
                console.log(`⚠️ Build args file not found: ${buildArgsPath}. Proceeding with empty options.`);
              }
            } else {
              console.log(`⚠️ Target ${currentTarget} not found in configuration. Using empty options.`);
            }
          } catch (err) {
            console.log(`❌ Error processing build args: ${err}. Using empty options.`);
          }

          console.log(`Parsed options: "${options}"`);
          core.setOutput('build_args', options);