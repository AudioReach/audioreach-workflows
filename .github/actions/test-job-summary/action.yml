name: LAVA test job summary
description: "Download LAVA job artifacts, build a Markdown summary, and upload it as a workflow artifact"

inputs:
  build_id:
    description: "ID of the workflow from which build URL will be downloaded"
    required: true
  gh_token:
    description: "Github token. It's required to download artifacts from the workflow"
    required: true
  prefix:
    description: "Prefix for the compressed file that is uploaded as workflow artifact"
    default: test-job*
  summary_file_name:
    description: "File name that is used to save test job summary"
    default: step-summary.txt

outputs:
  artifact_id:
    description: "ID of the uploaded artifact"
    value: ${{ steps.upload-summary.outputs.artifact-id }}

runs:
  using: "composite"

  steps:
    - name: Download required artifacts only (skip dockerbuild)
        # This step downloads artifacts produced by parallel jobs
      uses: actions/download-artifact@v6
      continue-on-error: true
      with:
        pattern: |
          test-job*
          test-results-*
          presigned_url_*.txt
        merge-multiple: true
        path: artifacts

    - name: "List files"
      shell: bash
      run: |
        echo "Workspace: $GITHUB_WORKSPACE"
        echo "Downloaded artifacts under ./artifacts:"
        ls -R artifacts || true

    - name: Publish Test Job Details
      shell: bash
      run: |
        set -euo pipefail
        shopt -s nullglob

        # Collect job JSONs under artifacts/ (supports parallel jobs)
        testjobs=(artifacts/${{ inputs.prefix }}.json)

        if [ ${#testjobs[@]} -eq 0 ]; then
          echo ":warning: No LAVA job artifacts found matching '${{ inputs.prefix }}.json' under ./artifacts" > "${{ inputs.summary_file_name }}"
          exit 0
        fi

        # Build INPUT by querying LAVA API for each job
        INPUT=$(
          for TESTJOB in "${testjobs[@]}"; do
            JOB_ID=$(jq -r ".id" < "${TESTJOB}")
            JOB_URL="https://lava.infra.foundries.io/results/${JOB_ID}"
            JOB_DETAILS=$(curl -s "https://lava.infra.foundries.io/api/v0.2/jobs/${JOB_ID}/")
            JOB_HEALTH=$(echo "$JOB_DETAILS" | jq -r ".health")
            JOB_STATE=$(echo "$JOB_DETAILS" | jq -r ".state")
            JOB_DEVICE_TYPE=$(echo "$JOB_DETAILS" | jq -r ".requested_device_type")

            TEST_RESULTS="{}"
            if [ "${JOB_STATE}" = "Finished" ] && [ "${JOB_HEALTH}" = "Complete" ]; then
              JOB_SUITES=$(curl -s "https://lava.infra.foundries.io/api/v0.2/jobs/${JOB_ID}/suites/")
              # Build map of test_name -> {url, result}
              TEST_RESULTS=$(
                for SUITE in $(echo "$JOB_SUITES" | jq -r -c ".results[]"); do
                  SUITE_NAME=$(echo "$SUITE" | jq -r ".name")
                  SUITE_ID=$(echo "$SUITE" | jq -r ".id")
                  SUITE_TESTS=$(curl -s "https://lava.infra.foundries.io/api/v0.2/jobs/${JOB_ID}/suites/${SUITE_ID}/tests/")

                  if [ "$SUITE_NAME" != "lava" ]; then
                    # Pair names and results
                    paste -d '|' \
                      <(echo "$SUITE_TESTS" | jq -r -c ".results[] | .name") \
                      <(echo "$SUITE_TESTS" | jq -r -c ".results[] | .result") \
                    | while IFS='|' read -r TEST_NAME TEST_RESULT; do
                        if [ -n "$TEST_NAME" ]; then
                          TEST_URL="${JOB_URL}"
                          TEST_RESULT_OBJ=$(jq --arg url "$TEST_URL" --arg result "$TEST_RESULT" -n -c '$ARGS.named')
                          jq -n -c --arg key "$TEST_NAME" --argjson value "$TEST_RESULT_OBJ" '$ARGS.named'
                        fi
                      done
                  else
                    # Provide a "boot" pseudo-test as pass
                    TEST_NAME="boot"
                    TEST_URL="${JOB_URL}"
                    TEST_RESULT_OBJ=$(jq --arg url "$TEST_URL" --arg result "pass" -n -c '$ARGS.named')
                    jq -n -c --arg key "$TEST_NAME" --argjson value "$TEST_RESULT_OBJ" '$ARGS.named'
                  fi
                done | jq -s -c --sort-keys 'from_entries'
              )
            fi

            # Emit a pair for this device type
            jq -n -c --arg key "$JOB_DEVICE_TYPE" --argjson value "$TEST_RESULTS" '$ARGS.named'
          done | jq -s -c 'reduce .[] as $i ({}; .[$i.key] = ((.[$i.key] // {}) + $i.value))'
        )

        # If INPUT is empty JSON or null, create a helpful message and exit
        if [ -z "${INPUT}" ] || [ "${INPUT}" = "null" ] || [ "${INPUT}" = "{}" ]; then
          {
            echo "### LAVA Test Summary"
            echo
            echo ":warning: No finished & complete LAVA jobs to summarize yet."
          } > "${{ inputs.summary_file_name }}"
          exit 0
        fi

        DEVICES=$(echo "$INPUT" | jq -r 'keys[]' | sort)
        RESULTS=$(echo "$INPUT" | jq -r '.[] | keys[]?' | sort -u)

        # Header
        {
          printf "| %s |" "Test"
          for D in $DEVICES; do
            printf " %s |" "$D"
          done
          echo

          # Separator
          printf "| ---- |"
          for _ in $DEVICES; do
            printf " ---- |"
          done
          echo

          # Rows
          for R in $RESULTS; do
            printf "| %s |" "$R"
            for D in $DEVICES; do
              VALUE=$(echo "$INPUT" | jq -r --arg d "$D" --arg r "$R" '.[$d][$r].result // ""')
              URL=$(echo "$INPUT"  | jq -r --arg d "$D" --arg r "$R" '.[$d][$r].url // ""')
              CHECKMARK=":white_check_mark:"
              if [ "${VALUE}" = "fail" ]; then CHECKMARK=":x:"; fi
              if [ "${VALUE}" = "skip" ]; then CHECKMARK=":warning:"; fi
              if [ -z "${VALUE}" ]; then CHECKMARK=":no_entry_sign:"; fi

              if [ -n "$URL" ]; then
                printf " %s [%s](%s) |" "$CHECKMARK" "$VALUE" "$URL"
              else
                printf " %s %s |" "$CHECKMARK" "$VALUE"
              fi
            done
            echo
          done

          echo
          echo "### All jobs summary"
          echo
          echo "| Job ID | Device | State | Health |"
          echo "| ---- | ---- | ---- | ---- |"
        } >> "${{ inputs.summary_file_name }}"

        # Append job list
        for TESTJOB in "${testjobs[@]}"; do
          JOB_ID=$(jq -r ".id" < "${TESTJOB}")
          JOB_URL="https://lava.infra.foundries.io/results/${JOB_ID}"
          JOB_DETAILS=$(curl -s "https://lava.infra.foundries.io/api/v0.2/jobs/${JOB_ID}/")
          JOB_HEALTH=$(echo "$JOB_DETAILS" | jq -r ".health")
          JOB_STATE=$(echo "$JOB_DETAILS" | jq -r ".state")
          JOB_DEVICE_TYPE=$(echo "$JOB_DETAILS" | jq -r ".requested_device_type")
          echo "| [${JOB_ID}](${JOB_URL}) | ${JOB_DEVICE_TYPE} | ${JOB_STATE} | ${JOB_HEALTH} |" >> "${{ inputs.summary_file_name }}"
        done

    - name: Upload summary
      id: upload-summary
      uses: actions/upload-artifact@v6
      with:
        path: ${{ inputs.summary_file_name }}
        name: ${{ inputs.summary_file_name }}
