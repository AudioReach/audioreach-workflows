name: LAVA Test Workflow
description: Trigger LAVA tests on the build

on:
  workflow_call:
    inputs:
      build_matrix:
        description: JSON string for the build matrix
        required: true
        type: string

      distro_name:
        required: false
        type: string
        default: qcom-distro
      kernel:
        required: false
        type: string
        default: ""
      testplan:
        required: false
        type: string
        default: pre-merge
      prefix:
        required: false
        type: string
        default: testjobs

      lava_url:
        required: false
        type: string
        default: lava.infra.foundries.io
      wait_for_job:
        required: false
        type: boolean
        default: true
      fail_on_test_failure:
        required: false
        type: boolean
        default: true

jobs:
  submit_lava:
    runs-on:
      group: GHA-AudioReach-SelfHosted-RG
      labels: [self-hosted, audior-prd-u2204-x64-large-od-ephem]

    outputs:
      tests_executed: ${{ steps.set-tests-flag.outputs.tests_executed }}

    strategy:
      fail-fast: false
      matrix:
        build_matrix: ${{ fromJSON(inputs.build_matrix) }}

    steps:
      - name: Set tests_executed=false (testing disabled)
        id: set-tests-flag
        if: ${{ matrix.build_matrix.testing_enabled != true }}
        run: |
          echo "tests_executed=false" >> "$GITHUB_OUTPUT"

      - name: Skip if testing disabled
        if: ${{ matrix.build_matrix.testing_enabled != true }}
        run: |
          echo "Testing disabled for ${{ matrix.build_matrix.image_name }}"
          exit 0

      - name: Set tests_executed=true
        id: set-tests-flag
        if: ${{ matrix.build_matrix.testing_enabled == true }}
        run: |
          echo "tests_executed=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: AudioReach/meta-audioreach

      - name: Download presigned URL
        uses: actions/download-artifact@v7
        with:
          name: presigned_url_${{ matrix.build_matrix.image_name }}.txt

      - name: Get build URL
        id: get_build_url
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const url = fs.readFileSync(
              `presigned_url_${{ matrix.build_matrix.image_name }}.txt`,
              'utf8'
            ).trim()
            core.setOutput('build_url', url)

      - name: Submit LAVA test job
        uses: AudioReach/audioreach-workflows/.github/actions/lava-test-plans@temp
        with:
          image_name: ${{ matrix.build_matrix.image_name }}
          machine_name: ${{ matrix.build_matrix.machine_name }}
          build_url: ${{ steps.get_build_url.outputs.build_url }}
          distro_name: ${{ inputs.distro_name }}
          kernel: ${{ inputs.kernel }}
          testplan: ${{ inputs.testplan }}
          prefix: ${{ inputs.prefix }}
          lava_token: ${{ secrets.LAVATOKEN }}
          lava_url: ${{ inputs.lava_url }}
          wait_for_job: ${{ inputs.wait_for_job }}
          fail_action_on_failure: ${{ inputs.fail_on_test_failure }}

  publish-test-summary:
    name: Publish Tests Summary
    needs: submit_lava
    if: ${{ needs.submit_lava.outputs.tests_executed == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Summary
        uses: AudioReach/audioreach-workflows/.github/actions/test-job-summary@temp
        with:
          build_id: ${{ github.run_id }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          summary_file_name: test_job_summary

      - name: Download Summaries
        uses: actions/download-artifact@v6
        with:
          pattern: test_job_summary*
          merge-multiple: true
          path: summaries

      - name: Publish Test Job Details
        run: |
          files=(summaries/test_job_summary*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No test summaries found" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## LAVA Test Job Summaries" >> "$GITHUB_STEP_SUMMARY"
          for f in "${files[@]}"; do
            echo "### $(basename "$f")" >> "$GITHUB_STEP_SUMMARY"
            cat "$f" >> "$GITHUB_STEP_SUMMARY"
          done